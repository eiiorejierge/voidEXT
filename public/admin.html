<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>voidEXT · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Space Grotesk',system-ui,sans-serif;}
:root{--star:rgba(255,255,255,0.9);}
body{min-height:100vh;background:#000;color:#fff;padding:30px 18px;position:relative;overflow-x:hidden;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:
  radial-gradient(1.5px 1.5px at 30px 40px,var(--star),transparent),
  radial-gradient(1px 1px at 140px 100px,var(--star),transparent),
  radial-gradient(1.5px 1.5px at 250px 170px,var(--star),transparent),
  radial-gradient(1px 1px at 340px 70px,var(--star),transparent),
  radial-gradient(1px 1px at 90px 250px,var(--star),transparent);
  background-size:400px 400px;background-repeat:repeat;animation:tw 6s ease-in-out infinite alternate;}
@keyframes tw{0%{opacity:.3;}100%{opacity:.85;}}
.wrap{max-width:960px;margin:0 auto;position:relative;z-index:1;}
h1{font-size:28px;font-weight:700;letter-spacing:3px;display:flex;align-items:center;gap:10px;}
h1 .dot{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);display:inline-block;}
.sub{color:rgba(255,255,255,0.5);font-size:14px;margin-top:6px;margin-bottom:24px;letter-spacing:.5px;}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:22px;margin-bottom:20px;backdrop-filter:blur(12px);}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px;}
.gate{max-width:380px;margin:70px auto;}
input{width:100%;padding:13px 15px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:11px;color:#fff;font-size:15px;outline:none;letter-spacing:1px;}
input:focus{border-color:#fff;}
.btn{padding:11px 18px;border:none;border-radius:10px;background:#fff;color:#000;font-weight:600;font-size:14px;cursor:pointer;transition:.2s;font-family:inherit;letter-spacing:.5px;}
.btn:hover{opacity:.88;}
.btn.sm{padding:7px 12px;font-size:12.5px;}
.btn.danger{background:transparent;border:1px solid rgba(239,68,68,0.5);color:#fff;}
.btn.danger:hover{background:rgba(239,68,68,0.25);}
.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fff;}
.btn.ghost:hover{border-color:#fff;}
.row{display:flex;gap:10px;align-items:center;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:14px;}
.stat{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.13);border-radius:13px;padding:16px;text-align:center;}
.stat .n{font-size:30px;font-weight:700;}
.stat .l{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid rgba(255,255,255,0.08);vertical-align:top;}
th{color:rgba(255,255,255,0.45);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;}
td.url{word-break:break-all;max-width:380px;}
.muted{color:rgba(255,255,255,0.45);}
.pill{display:inline-block;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:2px 10px;font-size:11px;}
.empty{color:rgba(255,255,255,0.4);font-size:13px;padding:10px 0;}
.msg{margin-top:10px;font-size:13px;padding:0;border-radius:9px;transition:.2s;}
.msg.show{padding:9px 12px;}
.msg.err{background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.45);}
.msg.ok{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);}
.hidden{display:none!important;}
a{color:#fff;}
.scroll{max-height:340px;overflow:auto;}
::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:10px;}
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrap">
  <h1><span class="dot"></span>voidEXT ADMIN</h1>
  <div class="sub">Keep the vault clean — reports, blocked links, and accounts.</div>

  <!-- GATE -->
  <div id="gate" class="card gate">
    <h2>Enter admin code</h2>
    <input id="keyInput" type="password" placeholder="Admin code" inputmode="numeric" autocomplete="off">
    <div class="msg" id="gateMsg"></div>
    <div style="margin-top:14px;"><button class="btn" id="enterBtn" style="width:100%;">Unlock</button></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hidden">
    <div class="card">
      <h2>Overview <button class="btn ghost sm" id="refreshBtn">Refresh</button></h2>
      <div class="stats" id="stats"></div>
    </div>

    <div class="card">
      <h2>Blocked links <span class="pill" id="blockedCount">0</span></h2>
      <div class="row" style="margin-bottom:14px;">
        <input id="blockUrl" type="text" placeholder="https://… block a URL manually">
        <button class="btn sm" id="blockBtn">Block</button>
      </div>
      <div class="scroll"><table><tbody id="blockedBody"></tbody></table></div>
      <div class="empty hidden" id="blockedEmpty">No blocked links. Clean vault. ✦</div>
    </div>

    <div class="card">
      <h2>Reports <button class="btn ghost sm" id="clearReportsBtn">Clear log</button></h2>
      <div class="scroll"><table>
        <thead><tr><th>Link</th><th>Reported by</th><th>When</th></tr></thead>
        <tbody id="reportsBody"></tbody>
      </table></div>
      <div class="empty hidden" id="reportsEmpty">No reports yet.</div>
    </div>

    <div class="card">
      <h2>Accounts <span class="pill" id="userCount">0</span></h2>
      <div class="scroll"><table>
        <thead><tr><th>Username</th><th>Created</th><th>Saved links</th><th>Theme</th><th></th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table></div>
      <div class="empty hidden" id="usersEmpty">No accounts yet.</div>
    </div>

    <div style="text-align:center;margin:10px 0 30px;"><button class="btn ghost sm" id="logoutBtn">Lock admin</button></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
(function(){
  var KEY_STORE='voidext_admin_key';
  var $=function(id){return document.getElementById(id);};
  function key(){try{return sessionStorage.getItem(KEY_STORE)||'';}catch(e){return'';}}
  function setKey(k){try{k?sessionStorage.setItem(KEY_STORE,k):sessionStorage.removeItem(KEY_STORE);}catch(e){}}
  function msg(el,t,k){el.className='msg show '+(k||'');el.textContent=t;}
  function clr(el){el.className='msg';el.textContent='';}
  function when(ts){if(!ts)return '—';return new Date(ts).toLocaleString();}
  function esc(s){var e=document.createElement('span');e.textContent=s==null?'':String(s);return e.innerHTML;}

  function api(path,opts){
    opts=opts||{};
    return fetch(path,{method:opts.method||'GET',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key()},body:opts.body?JSON.stringify(opts.body):undefined})
      .then(function(r){return r.json().catch(function(){return{};}).then(function(j){return{ok:r.ok,status:r.status,data:j};});});
  }

  $('enterBtn').onclick=unlock;
  $('keyInput').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
  function unlock(){
    var k=$('keyInput').value.trim();
    if(!k){msg($('gateMsg'),'Enter the admin code.','err');return;}
    setKey(k);
    api('/api/admin/stats').then(function(res){
      if(!res.ok){setKey('');msg($('gateMsg'),res.data.error||'Wrong code.','err');return;}
      $('gate').classList.add('hidden');$('dash').classList.remove('hidden');loadAll();
    }).catch(function(){setKey('');msg($('gateMsg'),'Network error.','err');});
  }

  function loadAll(){loadStats();loadBlocked();loadReports();loadUsers();}

  function loadStats(){
    api('/api/admin/stats').then(function(res){
      if(res.status===401||res.status===429){return lock();}
      if(!res.ok)return;
      var d=res.data;
      $('stats').innerHTML=[
        ['Accounts',d.accounts],['Active links',d.activeLinks],['Total links',d.totalLinks],
        ['Blocked',d.blockedCount],['Reports',d.reportsCount]
      ].map(function(x){return '<div class="stat"><div class="n">'+x[1]+'</div><div class="l">'+x[0]+'</div></div>';}).join('');
    });
  }

  function loadBlocked(){
    api('/api/admin/blocked').then(function(res){
      if(!res.ok)return;
      var blocked=res.data.blocked||[];
      $('blockedCount').textContent=blocked.length;
      var tb=$('blockedBody');tb.innerHTML='';
      $('blockedEmpty').classList.toggle('hidden',blocked.length>0);
      blocked.forEach(function(url){
        var tr=document.createElement('tr');
        tr.innerHTML='<td class="url"><a href="'+esc(url)+'" target="_blank" rel="noopener">'+esc(url)+'</a></td>'+
          '<td style="text-align:right;white-space:nowrap;"><button class="btn ghost sm">Unblock</button></td>';
        tr.querySelector('button').onclick=function(){
          api('/api/admin/unblock',{method:'POST',body:{url:url}}).then(function(r){if(r.ok){loadBlocked();loadStats();ok('Restored to rotation.');}});
        };
        tb.appendChild(tr);
      });
    });
  }

  function loadReports(){
    api('/api/admin/blocked').then(function(res){
      if(!res.ok)return;
      var reports=(res.data.reports||[]).slice().reverse();
      var tb=$('reportsBody');tb.innerHTML='';
      $('reportsEmpty').classList.toggle('hidden',reports.length>0);
      reports.forEach(function(r){
        var tr=document.createElement('tr');
        tr.innerHTML='<td class="url"><a href="'+esc(r.url)+'" target="_blank" rel="noopener">'+esc(r.url)+'</a></td>'+
          '<td><span class="pill">'+esc(r.by||'?')+'</span></td>'+
          '<td class="muted" style="white-space:nowrap;">'+esc(when(r.at))+'</td>';
        tb.appendChild(tr);
      });
    });
  }

  function loadUsers(){
    api('/api/admin/users').then(function(res){
      if(!res.ok)return;
      var users=res.data.users||[];
      $('userCount').textContent=users.length;
      var tb=$('usersBody');tb.innerHTML='';
      $('usersEmpty').classList.toggle('hidden',users.length>0);
      users.forEach(function(u){
        var tr=document.createElement('tr');
        tr.innerHTML='<td><b>'+esc(u.username)+'</b></td>'+
          '<td class="muted" style="white-space:nowrap;">'+esc(when(u.created))+'</td>'+
          '<td>'+u.linkCount+'</td>'+
          '<td><span class="pill">'+esc(u.settings&&u.settings.theme)+'</span></td>'+
          '<td style="text-align:right;"><button class="btn danger sm">Delete</button></td>';
        tr.querySelector('button').onclick=function(){
          api('/api/admin/delete-user',{method:'POST',body:{username:u.username}}).then(function(r){if(r.ok){loadUsers();loadStats();ok('Account deleted.');}});
        };
        tb.appendChild(tr);
      });
    });
  }

  $('blockBtn').onclick=function(){
    var u=$('blockUrl').value.trim();if(!u)return;
    api('/api/admin/block',{method:'POST',body:{url:u}}).then(function(r){
      if(r.ok){$('blockUrl').value='';loadBlocked();loadReports();loadStats();ok('Link blocked.');}
      else err(r.data.error||'Could not block.');
    });
  };
  $('clearReportsBtn').onclick=function(){
    api('/api/admin/clear-reports',{method:'POST'}).then(function(r){if(r.ok){loadReports();loadStats();ok('Reports cleared.');}});
  };
  $('refreshBtn').onclick=loadAll;
  $('logoutBtn').onclick=lock;

  function ok(t){msg($('msg'),t,'ok');setTimeout(function(){clr($('msg'));},2500);}
  function err(t){msg($('msg'),t,'err');}
  function lock(){setKey('');$('dash').classList.add('hidden');$('gate').classList.remove('hidden');$('keyInput').value='';}

  if(key()){
    api('/api/admin/stats').then(function(res){
      if(res.ok){$('gate').classList.add('hidden');$('dash').classList.remove('hidden');loadAll();}
      else setKey('');
    });
  }
})();
</script>
</body>
</html>
